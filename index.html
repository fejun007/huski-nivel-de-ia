<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>huski — Nível de IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Tokens ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0F0F0F;
    --slate:  #1A1A1A;
    --panel:  #222222;
    --border: #2E2E2E;
    --white:  #FFFFFF;
    --fog:    #A8A8A8;
    --muted:  #6B6B6B;
    --pulse:  #00D4FF;
    --pulse-dim: #00D4FF18;
    --pulse-border: #00D4FF40;
    --score:  #00FF90;
    --alert:  #FF6B35;
  }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Layout ─────────────────────────────────────────────────── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    user-select: none;
  }
  .logo .bracket { color: var(--pulse); opacity: 0.7; }

  .header-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .session-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pulse);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--score);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Messages ───────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 88%;
    animation: msg-in 0.25s ease-out both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.aria { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--pulse);
    flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .msg.user .avatar {
    background: var(--pulse-dim);
    border-color: var(--pulse-border);
    color: var(--pulse);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
  }
  .msg.aria .bubble {
    background: var(--slate);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--white);
    border-left: 3px solid var(--pulse);
    padding-left: 14px;
  }
  .msg.user .bubble {
    background: var(--pulse-dim);
    border: 1px solid var(--pulse-border);
    border-top-right-radius: 4px;
    color: var(--white);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pulse);
    opacity: 0.4;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.4; transform: scale(1); }
    40%           { opacity: 1;   transform: scale(1.3); }
  }

  /* ── Input ──────────────────────────────────────────────────── */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--slate);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--pulse-border); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    caret-color: var(--pulse);
  }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--pulse);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    color: var(--ink);
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* ── Result Card ─────────────────────────────────────────────── */
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    animation: fade-in 0.4s ease both;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .result-card {
    background: var(--slate);
    border: 1px solid var(--border);
    border-top: 3px solid var(--pulse);
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    animation: card-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-level-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--pulse-dim);
    border: 1px solid var(--pulse-border);
    border-radius: 99px;
    padding: 4px 14px 4px 10px;
    margin-bottom: 20px;
  }
  .result-level-badge .level-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pulse);
    font-weight: 500;
  }
  .result-level-badge .level-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--pulse);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .result-score-big {
    font-family: 'DM Mono', monospace;
    font-size: 72px;
    font-weight: 500;
    color: var(--pulse);
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-score-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .result-desc {
    color: var(--fog);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 28px;
  }

  .result-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Dimensões */
  .dimensions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }
  .dim-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .dim-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dim-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    text-transform: capitalize;
  }
  .dim-score {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--pulse);
  }
  .dim-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--score);
    width: 0%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dim-bar-fill.low  { background: var(--alert); }
  .dim-bar-fill.mid  { background: var(--pulse); }
  .dim-bar-fill.high { background: var(--score); }

  /* Listas */
  .result-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }
  .result-list li {
    display: flex;
    gap: 10px;
    color: var(--fog);
    font-size: 14px;
    line-height: 1.5;
  }
  .result-list li::before {
    content: '·';
    color: var(--pulse);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .result-questions-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .result-question-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    background: var(--panel);
  }
  .result-question-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pulse);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .result-question-text {
    font-size: 13px;
    color: var(--fog);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .result-question-answer {
    font-size: 13px;
    color: var(--white);
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .result-question-feedback {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-restart {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fog);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-restart:hover { border-color: var(--pulse-border); color: var(--white); }

  .btn-share {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--pulse);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-share:hover { opacity: 0.85; }

  /* ── Grid sutil ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; }

  /* ── Onboarding overlay ──────────────────────────────────────── */
  .onboarding-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 200;
  }
  .onboarding-card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .ob-brand {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
    align-self: flex-start;
  }
  .ob-brand span { color: var(--pulse); opacity: 0.7; }

  .aria-orb {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #00D4FF 0%, #7B2FBE 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    flex-shrink: 0;
    animation: orbIdle 3s ease-in-out infinite;
    transition: animation 0.2s;
  }
  @keyframes orbIdle {
    0%,100% { box-shadow: 0 0 0 0 #00D4FF30; }
    50%      { box-shadow: 0 0 0 14px #00D4FF00; }
  }
  .aria-orb.speaking {
    animation: orbSpeak 0.5s ease-in-out infinite;
  }
  @keyframes orbSpeak {
    0%,100% { box-shadow: 0 0 0 0 #00D4FF50; transform: scale(1); }
    50%      { box-shadow: 0 0 0 18px #00D4FF00; transform: scale(1.04); }
  }

  .speech-bubble {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    min-height: 90px;
  }
  .speech-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--pulse);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .speech-text {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--white);
  }
  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--pulse);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Loading screen ──────────────────────────────────────────── */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 300;
    transition: opacity 0.6s ease;
  }
  .loading-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  .loading-brand {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .loading-brand span { color: var(--pulse); opacity: 0.7; }
  .loading-bar-wrap {
    width: 220px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: var(--pulse);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .loading-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    min-height: 16px;
  }
  .btn-start-loading {
    margin-top: 8px;
    padding: 14px 36px;
    border-radius: 12px;
    border: none;
    background: var(--pulse);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  .btn-start-loading.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .btn-start-loading:hover { opacity: 0.88; }

  .ob-input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  .ob-input-group.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .ob-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .ob-input:focus { border-color: var(--pulse); }
  .ob-input::placeholder { color: var(--muted); }

  .btn-ob {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--pulse);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    opacity: 0;
    pointer-events: none;
  }
  .btn-ob.show {
    opacity: 1;
    pointer-events: all;
  }
  .btn-ob:hover { opacity: 0.88; transform: translateY(-1px); }

  /* ── Gravação de áudio ──────────────────────────────────────── */
  .record-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .btn-record {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fog);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .btn-record:hover { border-color: var(--pulse-border); color: var(--white); }
  .btn-record.recording {
    border-color: #FF6B35;
    background: #FF6B3510;
    color: #FF6B35;
  }
  .rec-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #FF6B35;
  }
  .rec-indicator.active { display: flex; }
  .rec-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FF6B35;
    animation: rec-blink 1s step-end infinite;
  }
  @keyframes rec-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .rec-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  .ob-dots {
    display: flex;
    gap: 6px;
  }
  .ob-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.35s, transform 0.35s;
  }
  .ob-dot.on { background: var(--pulse); transform: scale(1.3); }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-brand"><span>[</span>H<span>]</span> huski</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:280px">
    <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
    <div class="loading-msg" id="loadingMsg">inicializando ambiente seguro...</div>
    <button class="btn-start-loading" id="btnStartLoading">Iniciar avaliação →</button>
  </div>
</div>

<!-- Onboarding Overlay -->
<div class="onboarding-overlay" id="onboardingOverlay">
  <div class="onboarding-card">

    <div class="ob-brand">
      <span>[</span>H<span>]</span> huski
    </div>

    <div class="ob-dots">
      <div class="ob-dot on"  id="dot0"></div>
      <div class="ob-dot"     id="dot1"></div>
      <div class="ob-dot"     id="dot2"></div>
    </div>

    <div class="aria-orb" id="ariaOrb">A</div>

    <div class="speech-bubble">
      <div class="speech-label">ARIA</div>
      <div class="speech-text" id="speechText"></div>
    </div>

    <div class="ob-input-group" id="obInputGroup">
      <input class="ob-input" type="text" id="obInput"
             placeholder="Digite aqui..." maxlength="80"
             onkeydown="if(event.key==='Enter') obNext()" />
    </div>

    <button class="btn-ob" id="btnOb" onclick="obNext()">Continuar →</button>

  </div>
</div>

<!-- App -->
<div class="app">
  <header>
    <div class="logo">
      <span class="bracket">[</span>H<span class="bracket">]</span>
      <span style="font-size:16px;font-weight:700;letter-spacing:-0.01em;margin-left:6px">huski</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px;margin-left:12px">
      <span style="font-size:13px;font-weight:600;color:var(--white)">Nível de IA</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">conversa com ARIA</span>
    </div>
    <div class="header-meta">
      <div class="status-dot" id="statusDot"></div>
      <span class="session-tag" id="sessionTag">SESSÃO ATIVA</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msgInput"
        placeholder="Digite sua resposta..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>

<!-- Result Overlay (hidden) -->
<div class="result-overlay" id="resultOverlay" style="display:none">
  <div class="result-card" id="resultCard"></div>
</div>

<script>
  const API_BASE = 'https://huski-nivel-de-ia-production.up.railway.app';
  let history = [];
  let turnCount = 0;
  let userName = '';
  let obStep = 0;
  let ttsReady = false;

  // ── Integração externa: sessão pode vir de outra aplicação via ?session_id=&nome= ──
  const urlParams = new URLSearchParams(window.location.search);
  let currentSessionId = urlParams.get('session_id') || null;
  const externalNome = urlParams.get('nome') || null;
  if (externalNome) {
    document.addEventListener('DOMContentLoaded', () => {
      const obIn = document.getElementById('obInput');
      if (obIn) obIn.value = externalNome;
    });
  }

  // ── TTS via Gemini 2.5 Flash (backend) ───────────────────────
  let currentAudio = null;

  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }

  // Pré-carrega o áudio e retorna objeto com .play() — Gemini TTS ou browser fallback
  async function fetchAudio(text) {
    stopAudio();
    try {
      const res = await fetch(`${API_BASE}/tts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error(`TTS ${res.status}`);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const audio = new Audio(url);
      await new Promise((resolve) => {
        audio.oncanplaythrough = resolve;
        audio.onerror = resolve; // não rejeita — cai no fallback
        audio.load();
      });
      if (audio.error) throw new Error('audio load error');
      const orb = document.getElementById('ariaOrb');
      audio.onended = () => { orb?.classList.remove('speaking'); URL.revokeObjectURL(url); currentAudio = null; };
      audio.onerror = () => { orb?.classList.remove('speaking'); URL.revokeObjectURL(url); currentAudio = null; };
      currentAudio = audio;
      return audio;
    } catch {
      // Fallback: browser SpeechSynthesis (sem quota, funciona offline)
      return makeBrowserTTS(text);
    }
  }

  function makeBrowserTTS(text) {
    if (!window.speechSynthesis) return null;
    const orb = document.getElementById('ariaOrb');
    return {
      play() {
        speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'pt-BR';
        utter.rate = 0.88;
        utter.pitch = 1.1;
        // Tenta selecionar voz feminina em pt-BR
        const voices = speechSynthesis.getVoices();
        const pick = voices.find(v => v.lang.startsWith('pt') && /female|feminino/i.test(v.name))
                  || voices.find(v => v.lang === 'pt-BR')
                  || voices.find(v => v.lang.startsWith('pt'));
        if (pick) utter.voice = pick;
        utter.onend = () => { orb?.classList.remove('speaking'); currentAudio = null; };
        speechSynthesis.speak(utter);
        return Promise.resolve();
      },
    };
  }

  // ── Typewriter ────────────────────────────────────────────────
  function typeWriter(text, el, speed, onDone) {
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);
    const timer = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i++]), cursor);
      } else {
        clearInterval(timer);
        cursor.remove();
        onDone && onDone();
      }
    }, speed);
  }

  // ── Onboarding steps ─────────────────────────────────────────
  const OB_SCRIPTS = [
    {
      text: 'Olá! Seja muito bem-vindo à avaliação de maturidade em IA da Huski. Meu nome é ARIA e vou te acompanhar nessa jornada. Essa avaliação foi criada para mapear exatamente em qual estágio de uso de inteligência artificial você está hoje — sem julgamentos e sem respostas certas ou erradas. Antes de começarmos… como posso te chamar?',
      inputType: 'text',
      placeholder: 'Seu nome',
      btn: 'Continuar →',
      dot: 0,
    },
    {
      text: '', // preenchido dinamicamente com o nome
      inputType: 'textarea',
      placeholder: 'Me conta sua experiência com IA...',
      btn: 'Continuar →',
      dot: 1,
    },
    {
      text: '', // preenchido dinamicamente
      inputType: null,
      btn: 'Estou pronto! →',
      dot: 2,
    },
  ];

  function setDot(idx) {
    [0,1,2].forEach(i => {
      document.getElementById('dot'+i).classList.toggle('on', i === idx);
    });
  }

  function showObStep(stepIdx, extraText) {
    const step = OB_SCRIPTS[stepIdx];
    const el   = document.getElementById('speechText');
    const inp  = document.getElementById('obInputGroup');
    const btn  = document.getElementById('btnOb');
    const obIn = document.getElementById('obInput');

    setDot(step.dot);
    inp.classList.remove('show');
    btn.classList.remove('show');

    const scriptText = extraText || step.text;
    const orb = document.getElementById('ariaOrb');
    const charsPerMs = scriptText.length > 200 ? 28 : 20;

    // Orb pulsa enquanto busca o áudio
    orb?.classList.add('speaking');
    el.innerHTML = '<span style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--muted);letter-spacing:0.05em;">processando sua resposta...</span>';

    fetchAudio(scriptText).then(audioObj => {
      orb?.classList.remove('speaking');
      if (audioObj) {
        orb?.classList.add('speaking');
        audioObj.play().catch(() => {});
      }
      typeWriter(scriptText, el, charsPerMs, () => {
        // Mostra input/botão após terminar de digitar
        if (step.inputType) {
          if (step.inputType === 'textarea') {
            inp.innerHTML = `
              <textarea class="ob-input" id="obInput" rows="3"
                placeholder="${step.placeholder}"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();obNext()}"></textarea>
              <div class="record-row">
                <button class="btn-record" id="btnRecord" onclick="toggleRecord()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="9" y="2" width="6" height="12" rx="3"/>
                    <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                  Gravar resposta
                </button>
                <div class="rec-indicator" id="recIndicator">
                  <div class="rec-dot"></div>
                  <span id="recTimer">0:00</span>
                </div>
              </div>
              <div class="rec-note" id="recNote"></div>`;
          } else {
            inp.innerHTML = `<input class="ob-input" type="text" id="obInput"
              placeholder="${step.placeholder}" maxlength="80"
              onkeydown="if(event.key==='Enter') obNext()" />`;
          }
          setTimeout(() => {
            inp.classList.add('show');
            btn.textContent = step.btn;
            btn.classList.add('show');
            document.getElementById('obInput')?.focus();
          }, 200);
        } else {
          inp.classList.remove('show');
          setTimeout(() => {
            btn.textContent = step.btn;
            btn.classList.add('show');
          }, 200);
        }
      });
    });
  }

  async function obNext() {
    const obIn = document.getElementById('obInput');
    const val  = obIn ? obIn.value.trim() : '';

    if (obStep === 0) {
      if (!val) { obIn.focus(); return; }
      userName = val;
      obStep = 1;
      const txt = `Prazer te conhecer, ${userName}! Agora me conta uma coisa: o que você já fez com inteligência artificial? Pode ser qualquer coisa — desde usar o ChatGPT para escrever um e-mail até criar automações ou sistemas mais complexos. Não existe resposta errada aqui!`;
      showObStep(1, txt);

    } else if (obStep === 1) {
      if (!val) { obIn.focus(); return; }
      const iaExperience = val;
      obStep = 2;

      // Salva sessão no backend (ou reutiliza session_id vindo de uma aplicação parceira via URL)
      if (!currentSessionId) {
        try {
          const r = await fetch(`${API_BASE}/session/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome: userName, resposta_inicial: iaExperience }),
          });
          const data = await r.json();
          currentSessionId = data.session_id || null;
        } catch (_) {}
      }

      const txt = `Perfeito, ${userName}! Já tenho um ótimo contexto sobre você. A avaliação combina questões de múltipla escolha, perguntas abertas e alguns desafios práticos — deve levar entre 8 e 12 minutos. Tudo pronto para começar?`;
      showObStep(2, txt);

    } else if (obStep === 2) {
      stopAudio();
      document.getElementById('onboardingOverlay').style.display = 'none';
      startTest();
    }
  }

  // ── Loading screen ────────────────────────────────────────────
  const LOADING_STEPS = [
    { pct: 10,  msg: 'inicializando ambiente seguro...',                        ms: 1100 },
    { pct: 24,  msg: 'verificando protocolos de avaliação...',                  ms: 1200 },
    { pct: 40,  msg: 'endereçando agentes exclusivos para observação...',        ms: 1300 },
    { pct: 56,  msg: 'calibrando métricas de maturidade em IA...',              ms: 1200 },
    { pct: 72,  msg: 'preparando sua experiência personalizada...',              ms: 1300 },
    { pct: 86,  msg: 'sincronizando inteligência conversacional...',             ms: 1100 },
    { pct: 96,  msg: 'finalizando configurações...',                             ms: 900  },
  ];

  function runLoadingScreen(onDone) {
    const bar = document.getElementById('loadingBar');
    const msg = document.getElementById('loadingMsg');
    const btn = document.getElementById('btnStartLoading');
    let i = 0;
    let animDone = false;

    function showButton() {
      bar.style.width = '100%';
      msg.textContent = 'tudo pronto!';
      btn.classList.add('show');
      btn.onclick = () => {
        btn.disabled = true;
        onDone();
      };
    }

    function checkReady() {
      // Só mostra o botão quando animação E áudio estiverem prontos
      if (animDone && preloadedAudio !== null) {
        showButton();
      }
    }

    function nextStep() {
      if (i >= LOADING_STEPS.length) {
        animDone = true;
        checkReady();
        // Se áudio ainda não chegou, espera em silêncio
        if (preloadedAudio === null) {
          const iv = setInterval(() => {
            if (preloadedAudio !== null) {
              clearInterval(iv);
              checkReady();
            }
          }, 100);
          // Timeout de segurança: 20s — mostra botão mesmo sem áudio
          setTimeout(() => { clearInterval(iv); if (!btn.classList.contains('show')) showButton(); }, 20000);
        }
        return;
      }
      const s = LOADING_STEPS[i++];
      bar.style.width = s.pct + '%';
      msg.textContent = s.msg;
      setTimeout(nextStep, s.ms);
    }

    nextStep();
  }

  // Pré-carrega o áudio do step 0 durante o loading
  let preloadedAudio = null;
  const STEP0_TEXT = 'Olá! Seja muito bem-vindo à avaliação de maturidade em IA da Huski. Meu nome é ARIA e vou te acompanhar nessa jornada. Essa avaliação foi criada para mapear exatamente em qual estágio de uso de inteligência artificial você está hoje — sem julgamentos e sem respostas certas ou erradas. Antes de começarmos… como posso te chamar?';

  window.addEventListener('load', () => {
    // Pré-carrega o áudio enquanto o loading roda em paralelo
    fetchAudio(STEP0_TEXT).then(audio => { preloadedAudio = audio; });

    runLoadingScreen(() => {
      // Chamado direto no onclick — áudio já está carregado (loading esperou)
      // Criar AudioContext desbloqueia autoplay no Chrome para toda a sessão
      try {
        const unlockCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockCtx.resume().then(() => unlockCtx.close()).catch(() => {});
      } catch(_) {}

      const screen = document.getElementById('loadingScreen');
      screen.classList.add('fade-out');
      setTimeout(() => { screen.style.display = 'none'; }, 700);

      const el  = document.getElementById('speechText');
      const orb = document.getElementById('ariaOrb');
      const charsPerMs = STEP0_TEXT.length > 200 ? 28 : 20;

      orb?.classList.add('speaking');

      // Áudio e typewriter disparam juntos — sem delay
      if (preloadedAudio) {
        preloadedAudio.play().catch(err => console.warn('play() falhou:', err));
      }
      typeWriter(STEP0_TEXT, el, charsPerMs, () => {
        const inp = document.getElementById('obInputGroup');
        const btn = document.getElementById('btnOb');
        inp.innerHTML = `<input class="ob-input" type="text" id="obInput"
          placeholder="Seu nome" maxlength="80"
          onkeydown="if(event.key==='Enter') obNext()" />`;
        setTimeout(() => {
          inp.classList.add('show');
          btn.textContent = 'Continuar →';
          btn.classList.add('show');
          document.getElementById('obInput')?.focus();
        }, 200);
      });
      setDot(0);
    });
  });

  // ── Gravação de áudio (step 1 onboarding) ────────────────────
  let mediaRecorder = null;
  let recognition   = null;
  let recTimerID    = null;
  let recSeconds    = 0;

  function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecord();
    } else {
      startRecord();
    }
  }

  async function startRecord() {
    const btn  = document.getElementById('btnRecord');
    const ind  = document.getElementById('recIndicator');
    const note = document.getElementById('recNote');

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      note.textContent = 'Permissão de microfone negada. Digite sua resposta acima.';
      return;
    }

    // MediaRecorder (guarda o áudio bruto)
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
    };

    // Web Speech API — transcrição em tempo real
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      recognition = new SR();
      recognition.lang = 'pt-BR';
      recognition.continuous = true;
      recognition.interimResults = true;
      let finalTranscript = '';
      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalTranscript += t + ' ';
          else interim = t;
        }
        const ta = document.getElementById('obInput');
        if (ta) ta.value = finalTranscript + interim;
      };
      recognition.start();
      note.textContent = 'Transcrevendo em tempo real...';
    } else {
      note.textContent = 'Gravando... (transcrição não suportada neste navegador — clique em Parar e escreva sua resposta)';
    }

    // UI
    btn.textContent = 'Parar gravação';
    btn.classList.add('recording');
    ind.classList.add('active');

    // Timer
    recSeconds = 0;
    recTimerID = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds / 60)).padStart(1,'0');
      const s = String(recSeconds % 60).padStart(2,'0');
      const timerEl = document.getElementById('recTimer');
      if (timerEl) timerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopRecord() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if (recognition) { try { recognition.stop(); } catch(_) {} recognition = null; }
    clearInterval(recTimerID);

    const btn  = document.getElementById('btnRecord');
    const ind  = document.getElementById('recIndicator');
    const note = document.getElementById('recNote');

    if (btn) {
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Gravar novamente`;
      btn.classList.remove('recording');
    }
    if (ind) ind.classList.remove('active');
    if (note) note.textContent = 'Gravação concluída. Edite o texto acima se quiser.';

    mediaRecorder = null;
  }

  // ── Banco de questões (pools para randomização) ───────────────

  const MC_POOL = [
    { id:'q1', type:'mc', text:'Com que frequência você usa ferramentas de IA no seu trabalho?',
      options:['Raramente ou nunca','Algumas vezes por semana','Todos os dias para tarefas pontuais','É parte central do meu fluxo de trabalho diário','Construo soluções de IA para outros usarem'] },
    { id:'q2', type:'mc', text:'Como você escreve suas instruções (prompts) para a IA?',
      options:['Frases curtas e diretas, sem estrutura','Defino persona, contexto e formato de saída esperado','Crio System Prompts com variáveis e instruções complexas','Desenvolvo prompts de orquestração para agentes autônomos','O prompt é secundário — foco em fine-tuning e arquitetura de modelos'] },
    { id:'q3', type:'mc', text:'Qual é o seu nível de uso de automação com IA?',
      options:['Não uso automações','Uso ferramentas prontas (Zapier básico, integrações nativas)','Crio automações no-code/low-code (n8n, Make, Zapier avançado)','Desenvolvo agentes autônomos com LangChain, CrewAI ou similares','Arquiteto sistemas multi-agente em produção'] },
    { id:'q4', type:'mc', text:'Como você lida com alucinações e erros das IAs?',
      options:['Aceito as respostas sem questionar muito','Sempre verifico informações críticas em outras fontes','Implemento loops de validação e tratamento de erros nos meus fluxos','Desenvolvo benchmarks próprios para avaliar qualidade em escala','Defino métricas e governança de qualidade de IA para toda a organização'] },
    { id:'q5', type:'mc', multi:true, text:'Qual das ações abaixo você já realizou? (selecione todas que se aplicam)',
      options:['Usei ChatGPT para escrever textos ou tirar dúvidas','Integrei IA a planilhas, e-mails ou ferramentas do dia a dia','Conectei APIs de LLMs a outras ferramentas via código ou plataformas no-code','Implementei RAG (busca em documentos próprios) ou function calling','Fiz fine-tuning de um modelo de linguagem aberto'] },
    { id:'q6', type:'mc', text:'Como a IA impacta seu trabalho hoje?',
      options:['Pouco ou nenhum impacto ainda','Me ajuda a fazer tarefas existentes mais rápido','Automatizou processos inteiros, liberando tempo para estratégia','Criei novos produtos ou serviços que não existiriam sem IA','Influencio a estratégia de IA da minha organização ou mercado'] },
    { id:'q7', type:'mc', text:'Qual conceito ou ferramenta você domina melhor?',
      options:['ChatGPT, Gemini, Claude (interfaces web)','Engenharia de prompt: few-shot, chain-of-thought, role prompting','APIs de LLMs, embeddings, bancos vetoriais','Agentes autônomos, RAG, function calling, orquestração multi-agente','Fine-tuning, RLHF, hiperparâmetros e arquitetura de modelos'] },
    { id:'q8', type:'mc', text:'Quando usa IA para resolver um problema complexo, como costuma agir?',
      options:['Peço a resposta diretamente e uso o que vier','Faço múltiplas tentativas refinando o prompt até ficar bom','Estruturo uma cadeia de prompts ou crio um fluxo automatizado','Delego sub-tarefas a agentes especializados com memória e ferramentas','Defino a arquitetura do sistema, escolho os modelos e cuido da infraestrutura'] },
    { id:'q9', type:'mc', text:'Como você avalia a qualidade das respostas que a IA gera?',
      options:['Pela intuição — se parece certo, uso','Comparo com fontes externas para validar o conteúdo','Tenho critérios definidos e processo de revisão estruturado','Uso métricas automáticas (BLEU, ROUGE, LLM-as-judge) integradas ao pipeline','Desenvolvo e mantenho benchmarks próprios com casos de teste específicos do negócio'] },
    { id:'q10', type:'mc', text:'Como você lida com dados sensíveis ou confidenciais ao usar IA?',
      options:['Não penso muito nisso','Evito colar dados sensíveis nas ferramentas','Uso ferramentas com políticas claras de privacidade e termos corporativos','Implemento anonimização, mascaramento de dados e controles de acesso','Defino políticas de governança de dados de IA para toda a organização'] },
    { id:'q11', type:'mc', text:'Qual é sua experiência com personalização de modelos de IA?',
      options:['Nunca personalizei — uso modelos prontos como são','Ajustei configurações básicas como temperatura e system prompt','Criei GPTs, assistentes customizados ou conectores com APIs próprias','Implementei RAG com dados proprietários ou fine-tuning supervisionado leve','Realizei fine-tuning completo, RLHF ou treinamento de modelos especialistas'] },
    { id:'q12', type:'mc', text:'Como você enxerga o papel da IA na estratégia da sua organização?',
      options:['Ainda não é relevante para o meu trabalho','É uma ferramenta de produtividade individual','É um driver de eficiência operacional em processos-chave','É um diferencial competitivo que cria novos produtos e modelos de negócio','É um ativo estratégico central que redefine o core business da empresa'] },
  ];

  const ADV_MC_POOL = [
    { id:'q13', type:'mc', text:'No contexto de engenharia de prompt avançada, qual é a principal diferença conceitual e prática entre as técnicas de "Chain-of-Thought" (CoT) e "Tree-of-Thoughts" (ToT)?',
      options:[
        'CoT força o modelo a traduzir o prompt para múltiplos idiomas antes de responder; ToT cria uma árvore genealógica de personas.',
        'CoT instrui o modelo a detalhar seu raciocínio passo a passo de forma linear antes de dar a resposta final; ToT permite que o modelo gere, avalie e explore múltiplas linhas de raciocínio paralelas (ramos), permitindo retrocesso (backtracking) para encontrar a melhor solução global.',
        'CoT é usada exclusivamente para gerar códigos de programação; ToT serve apenas para organizar pastas de arquivos.',
        'Ambas as técnicas produzem exatamente o mesmo resultado lógico, mudando apenas a quantidade de tokens consumidos na API.',
      ],
      criteria:'Pergunta técnica objetiva com resposta correta única. Resposta correta: alternativa que descreve CoT como raciocínio linear passo a passo e ToT como exploração de múltiplos ramos de raciocínio com backtracking. Se o candidato não selecionar essa alternativa, o gabarito deve indicar a resposta certa e explicar por que a escolhida está incorreta.',
      correctIndex:1, difficulty:'media' },
    { id:'q14', type:'mc', text:'Ao desenhar uma arquitetura RAG (Retrieval-Augmented Generation), o que representa o problema conhecido como "Lost in the Middle" (Perdido no Meio)?',
      options:[
        'A tendência dos modelos de linguagem de ignorar completamente o início e o fim de um prompt longo, focando apenas no centro do texto.',
        'A incapacidade de bancos de dados vetoriais de indexarem documentos que possuem tabelas no meio das páginas.',

      text:'Você é gestor de marketing em uma empresa de médio porte. Seu maior concorrente acabou de lançar uma campanha viral usando IA generativa para criar conteúdo personalizado em escala. Sua equipe tem 3 pessoas — nenhuma técnica — e 2 semanas para reagir. Como você usaria IA para montar uma resposta competitiva? Detalhe as ferramentas, o processo e como mediria o resultado.',

  // Randomização: 8 MC + 2 cases + 2 reviews
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Motor adaptativo de dificuldade (11 MC) ────────────────────
  // Embaralha as opções de uma questão preservando o índice da correta.
  function shuffleOptionsKeepingCorrect(q) {
    const idx = q.options.map((_, i) => i);
    const shuffledIdx = shuffle(idx);
    const options = shuffledIdx.map(i => q.options[i]);
    const correctIndex = shuffledIdx.indexOf(q.correctIndex);
    return { ...q, options, correctIndex };
  }

  const DIFFICULTY_TIERS = ['facil', 'media', 'dificil'];

  function nextDifficulty(current, correct) {
    const i = DIFFICULTY_TIERS.indexOf(current);
    if (correct) return DIFFICULTY_TIERS[Math.min(i + 1, DIFFICULTY_TIERS.length - 1)];
    return DIFFICULTY_TIERS[Math.max(i - 1, 0)];
  }

  let usedMcIds = new Set();

  function pickNextMCQuestion(difficulty) {
    const pool = ADV_MC_POOL.filter(q => q.difficulty === difficulty);
    const candidates = pool.filter(q => !usedMcIds.has(q.id));
    const chosen = shuffle(candidates.length ? candidates : pool)[0];
    usedMcIds.add(chosen.id);
    return shuffleOptionsKeepingCorrect(chosen);
  }

  const SELF_EVAL_COUNT = 5;
  const ADAPTIVE_COUNT  = 6;
  const ADAPTIVE_START  = SELF_EVAL_COUNT;
  const ADAPTIVE_END    = ADAPTIVE_START + ADAPTIVE_COUNT;

  function buildTestQuestions() {
    usedMcIds = new Set();
    currentDifficulty = 'facil';

    // 5 perguntas aleatórias de autoavaliação (q1 a q12, sem dificuldade adaptativa)
    const selfEval = shuffle(MC_POOL).slice(0, SELF_EVAL_COUNT).map(q => ({
      ...q,
      options: shuffle(q.options),
    }));

    // 6 perguntas técnicas adaptativas (fácil/média/difícil) — as 2 primeiras são fáceis (calibração)
    const adaptiveSlots = new Array(ADAPTIVE_COUNT).fill(null);
    adaptiveSlots[0] = pickNextMCQuestion('facil');
    adaptiveSlots[1] = pickNextMCQuestion('facil');

    return [
      ...selfEval,
      ...adaptiveSlots,
      ...shuffle(CASE_POOL).slice(0, 2),
      ...shuffle(REVIEW_POOL).slice(0, 2),
    ];
  }

  let TEST_QUESTIONS = [];
  let currentDifficulty = 'facil';

  let testAnswers  = [];
  let currentQ     = -1;
  let caseTimerID  = null;
  let caseSecsLeft = 0;

  function startTest() {
    TEST_QUESTIONS = buildTestQuestions();
    currentQ = 0;
    testAnswers = [];
    showTestQuestion(0);
  }

  function showTestQuestion(idx) {
    if (idx >= TEST_QUESTIONS.length) { submitTest(); return; }
    const q = TEST_QUESTIONS[idx];
    const total = TEST_QUESTIONS.length;
    const tag = { mc:'Múltipla Escolha', case:'Case', review:'Review Reverso' }[q.type];

    // Atualiza progresso no header
    document.getElementById('sessionTag').textContent = `${idx + 1} / ${total}`;

    // Mensagem ARIA com a pergunta
    const prefix = q.type === 'mc'
      ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--pulse);letter-spacing:.08em;">${tag}</span><br><br>`
      : q.type === 'case'
      ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--alert);letter-spacing:.08em;">CASE — você tem 2 min 10 seg</span><br><br>`
      : `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--score);letter-spacing:.08em;">REVIEW REVERSO</span><br><br>`;

    appendAriaMsg(prefix + escapeHtml(q.text).replace(/\n/g,'<br>'));

    // Se tem artefato (review), mostra bloco de código
    if (q.artifact) {
      const msgs = document.getElementById('messages');
      const art = document.createElement('div');
      art.style.cssText = 'margin:0 0 0 44px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--score);border-radius:10px;padding:14px 16px;font-family:"DM Mono",monospace;font-size:13px;color:var(--fog);line-height:1.6;white-space:pre-wrap;';
      art.textContent = q.artifact;
      msgs.appendChild(art);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Renderiza input adequado
    renderQuestionInput(q);
  }

  function renderQuestionInput(q) {
    const area = document.querySelector('.input-area');
    if (q.type === 'mc' && q.multi) {
      area.innerHTML = `
        <div style="padding:12px 24px 20px;display:flex;flex-direction:column;gap:8px;">
          ${q.options.map((opt, i) => `
            <button id="mopt_${i}" onclick="toggleMulti(${i},'${q.id}')"
              style="text-align:left;padding:12px 16px;border-radius:10px;border:1px solid var(--border);
                     background:var(--panel);color:var(--fog);font-family:'Plus Jakarta Sans',sans-serif;
                     font-size:14px;cursor:pointer;transition:border-color .2s,color .2s,background .2s;display:flex;align-items:center;gap:10px;">
              <span id="mcheck_${i}" style="width:16px;height:16px;border-radius:4px;border:1px solid var(--border);
                     display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;"></span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--pulse);margin-right:4px;">${String.fromCharCode(65+i)})</span>${escapeHtml(opt)}
            </button>`).join('')}
          <button onclick="confirmMulti('${q.id}')"
            style="margin-top:4px;padding:13px;border-radius:10px;border:none;background:var(--pulse);color:var(--ink);
                   font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
            Confirmar seleção →
          </button>
        </div>`;
    } else if (q.type === 'mc') {
      area.innerHTML = `
        <div style="padding:12px 24px 20px;display:flex;flex-direction:column;gap:8px;" id="mcOptions">
          ${q.options.map((opt, i) => `
            <button onclick="selectMC(${i},'${q.id}','${escapeAttr(opt)}')"
              style="text-align:left;padding:12px 16px;border-radius:10px;border:1px solid var(--border);
                     background:var(--panel);color:var(--fog);font-family:'Plus Jakarta Sans',sans-serif;
                     font-size:14px;cursor:pointer;transition:border-color .2s,color .2s,background .2s;"
              onmouseover="this.style.borderColor='var(--pulse-border)';this.style.color='var(--white)'"
              onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--fog)'">
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--pulse);margin-right:10px;">${String.fromCharCode(65+i)})</span>${escapeHtml(opt)}
            </button>`).join('')}
        </div>`;
    } else if (q.type === 'case') {
      area.innerHTML = `
        <div style="padding:12px 24px 20px;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">tempo restante</div>
            <div id="caseTimer" style="font-family:'DM Mono',monospace;font-size:20px;color:var(--alert);font-weight:600;">2:10</div>
          </div>
          <textarea id="caseInput" class="ob-input" rows="4"
            placeholder="Descreva sua solução aqui... ou grave um áudio abaixo."
            style="resize:vertical;"></textarea>
          <div class="record-row">
            <button class="btn-record" id="btnRecord" onclick="toggleRecord()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Gravar resposta
            </button>
            <div class="rec-indicator" id="recIndicator"><div class="rec-dot"></div><span id="recTimer">0:00</span></div>
          </div>
          <div class="rec-note" id="recNote"></div>
          <button onclick="submitCaseOrReview('${q.id}','case')"
            style="padding:14px;border-radius:12px;border:none;background:var(--pulse);color:var(--ink);
                   font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">
            Enviar resposta →
          </button>
        </div>`;
      startCaseTimer(q.id, 'case');
    } else if (q.type === 'review') {
      area.innerHTML = `
        <div style="padding:12px 24px 20px;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">tempo restante</div>
            <div id="caseTimer" style="font-family:'DM Mono',monospace;font-size:20px;color:var(--alert);font-weight:600;">2:10</div>
          </div>
          <textarea id="reviewInput" class="ob-input" rows="4"
            placeholder="Descreva os problemas que encontrou e como você melhoraria..."
            style="resize:vertical;"></textarea>
          <div class="record-row">
            <button class="btn-record" id="btnRecord" onclick="toggleRecord()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Gravar análise
            </button>
            <div class="rec-indicator" id="recIndicator"><div class="rec-dot"></div><span id="recTimer">0:00</span></div>
          </div>
          <div class="rec-note" id="recNote"></div>
          <button onclick="submitCaseOrReview('${q.id}','review')"
            style="padding:14px;border-radius:12px;border:none;background:var(--score);color:var(--ink);
                   font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">
            Enviar análise →
          </button>
        </div>`;
      startCaseTimer(q.id, 'review');
    }
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  const multiSelected = new Set();

  function toggleMulti(idx, qId) {
    const btn   = document.getElementById(`mopt_${idx}`);
    const check = document.getElementById(`mcheck_${idx}`);
    if (multiSelected.has(idx)) {
      multiSelected.delete(idx);
      btn.style.borderColor   = 'var(--border)';
      btn.style.background    = 'var(--panel)';
      btn.style.color         = 'var(--fog)';
      check.style.background  = 'transparent';
      check.style.borderColor = 'var(--border)';
      check.textContent       = '';
    } else {
      multiSelected.add(idx);
      btn.style.borderColor   = 'var(--pulse)';
      btn.style.background    = 'var(--pulse-dim)';
      btn.style.color         = 'var(--white)';
      check.style.background  = 'var(--pulse)';
      check.style.borderColor = 'var(--pulse)';
      check.textContent       = '✓';
      check.style.color       = 'var(--ink)';
    }
  }

  function confirmMulti(qId) {
    if (multiSelected.size === 0) return;
    const q = TEST_QUESTIONS[currentQ];
    const labels = [...multiSelected].sort().map(i => String.fromCharCode(65 + i));
    const texts  = [...multiSelected].sort().map(i => q.options[i]);
    testAnswers.push({
      question_id: qId, question_type: 'mc',
      question_text: q.text,
      answer_text: texts.join('; '),
      option_label: labels.join(', '),
    });
    appendUserMsg(labels.map((l, i) => `${l}) ${texts[i]}`).join('\n'));
    multiSelected.clear();
    currentQ++;
    setTimeout(() => showTestQuestion(currentQ), 600);
  }

  function selectMC(optIdx, qId, optText) {
    clearCaseTimer();
    stopRecord();

    const q = TEST_QUESTIONS[currentQ];
    const label = String.fromCharCode(65 + optIdx);
    const isAdaptive = q.correctIndex !== undefined;
    const correct = isAdaptive ? (optIdx === q.correctIndex) : null;
    testAnswers.push({
      question_id: qId, question_type: 'mc', question_text: q.text, answer_text: optText,
      option_label: label, criteria: q.criteria || null,
      is_correct: correct, difficulty: q.difficulty || null,
    });

    appendUserMsg(`${label}) ${optText}`);

    const nextIdx = currentQ + 1;
    if (isAdaptive && nextIdx < ADAPTIVE_END && (currentQ - ADAPTIVE_START) >= 1) {
      currentDifficulty = nextDifficulty(currentDifficulty, correct);
      TEST_QUESTIONS[nextIdx] = pickNextMCQuestion(currentDifficulty);
    }

    currentQ = nextIdx;
    setTimeout(() => showTestQuestion(currentQ), 600);
  }

  function submitCaseOrReview(qId, type) {
    clearCaseTimer();
    stopRecord();

    const inputId = type === 'case' ? 'caseInput' : 'reviewInput';
    const val = (document.getElementById(inputId)?.value || '').trim();
    if (!val) { alert('Por favor, escreva ou grave sua resposta antes de continuar.'); return; }

    const q = TEST_QUESTIONS[currentQ];
    testAnswers.push({
      question_id: qId,
      question_type: type,
      question_text: q.text,
      answer_text: val,
      criteria: q.criteria || null,
    });
    appendUserMsg(val);
    currentQ++;
    setTimeout(() => showTestQuestion(currentQ), 600);
  }

  function startCaseTimer(qId, type) {
    clearCaseTimer();
    caseSecsLeft = 130;
    function tick() {
      const el = document.getElementById('caseTimer');
      if (!el) return;
      const m = Math.floor(caseSecsLeft / 60);
      const s = String(caseSecsLeft % 60).padStart(2, '0');
      el.textContent = `${m}:${s}`;
      el.style.color = caseSecsLeft <= 30 ? '#FF3B3B' : 'var(--alert)';
      if (caseSecsLeft <= 0) {
        clearCaseTimer();
        submitCaseOrReview(qId, type);
        return;
      }
      caseSecsLeft--;
      caseTimerID = setTimeout(tick, 1000);
    }
    tick();
  }

  function clearCaseTimer() {
    if (caseTimerID) { clearTimeout(caseTimerID); caseTimerID = null; }
  }

  function appendAriaMsg(htmlContent) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg aria';
    div.innerHTML = `<div class="avatar">[A]</div><div class="bubble">${htmlContent}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendUserMsg(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="avatar">EU</div><div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  const EVAL_WAIT_MESSAGES = [
    'avaliando suas respostas...',
    'agentes de IA lendo seus cases...',
    'comparando com os critérios de cada nível...',
    'consolidando seu perfil de maturidade...',
    'calculando sua nota final...',
  ];

  let evalWaitTimer = null;

  function startEvalWaitMessages() {
    const el = document.querySelector('.input-area');
    let i = 0;
    el.innerHTML = `
      <div id="evalWaitMsg" style="padding:20px 24px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);">
        ${EVAL_WAIT_MESSAGES[0]}
      </div>`;
    evalWaitTimer = setInterval(() => {
      i = (i + 1) % EVAL_WAIT_MESSAGES.length;
      const msgEl = document.getElementById('evalWaitMsg');
      if (msgEl) msgEl.textContent = EVAL_WAIT_MESSAGES[i];
    }, 1800);
  }

  function stopEvalWaitMessages() {
    if (evalWaitTimer) { clearInterval(evalWaitTimer); evalWaitTimer = null; }
  }

  async function submitTest() {
    startEvalWaitMessages();
    appendAriaMsg('Perfeito! Recebi todas as suas respostas. Estou analisando seu perfil de maturidade em IA agora — isso leva alguns segundos.');

    try {
      const res = await fetch(`${API_BASE}/nivel-ia/evaluate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: userName, answers: testAnswers, session_id: currentSessionId }),
      });
      if (!res.ok) throw new Error(await res.text());
      const result = await res.json();
      stopEvalWaitMessages();
      setTimeout(() => showResult(result), 800);
    } catch (e) {
      stopEvalWaitMessages();
      appendAriaMsg('Ocorreu um erro ao processar sua avaliação. Por favor, recarregue a página.');
      console.error(e);
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function startSession() {
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/nivel-ia/start`, { method: 'POST' });
      const data = await res.json();
      removeTyping();
      appendMessage('aria', data.message);
      history.push({ role: 'assistant', content: data.message });
      enableInput();
    } catch (e) {
      removeTyping();
      appendMessage('aria', `Olá, ${userName || 'bem-vindo'}! Tive um problema ao conectar. Tente recarregar a página.`);
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    disableInput();

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    turnCount++;

    showTyping();
    try {
      const res = await fetch(`${API_BASE}/nivel-ia/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history: history.slice(0, -1), message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.message) {
        appendMessage('aria', data.message);
        history.push({ role: 'assistant', content: data.message });
      }

      if (data.finished && data.result) {
        setTimeout(() => showResult(data.result), 800);
      } else {
        enableInput();
      }
    } catch (e) {
      removeTyping();
      appendMessage('aria', 'Ocorreu um erro. Tente novamente.');
      enableInput();
    }
  }

  function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const avatarLabel = role === 'aria' ? '[A]' : 'EU';
    msg.innerHTML = `
      <div class="avatar">${avatarLabel}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.className = 'msg aria';
    typing.id = 'typingMsg';
    typing.innerHTML = `
      <div class="avatar">[A]</div>
      <div class="bubble typing-indicator">
        <span></span><span></span><span></span>
      </div>
    `;
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function enableInput() {
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }

  function disableInput() {
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  }

  function showResult(result) {
    const overlay = document.getElementById('resultOverlay');
    const card    = document.getElementById('resultCard');
    const nivel   = result.nivel || '?';
    const titulo  = result.titulo || '';
    const resumo  = result.resumo || '';
    const questoes = result.questoes || [];
    const passos  = result.proximos_passos && result.proximos_passos.length
      ? result.proximos_passos
      : (result.proximo_passo ? [result.proximo_passo] : []);

    // Barra de progresso visual (nivel/5)
    const pct = Math.round((nivel / 5) * 100);
    const barColor = nivel <= 2 ? 'var(--alert)' : nivel === 3 ? 'var(--pulse)' : 'var(--score)';

    const tipoLabel = { mc: 'Múltipla Escolha', case: 'Case', review: 'Review Reverso' };

    const questoesHtml = questoes.map((q, idx) => {
      const tipo = tipoLabel[q.tipo] || q.tipo || '';
      if (q.tipo === 'mc') {
        return `
          <div class="result-question-card">
            <div class="result-question-tag">${idx + 1}. ${tipo}</div>
            <div class="result-question-text">${escapeHtml(q.pergunta || '')}</div>
            <div class="result-question-answer"><strong>Sua resposta:</strong> ${escapeHtml(q.resposta_usuario || '')}</div>
            ${q.gabarito ? `<div class="result-question-feedback"><strong>Gabarito:</strong> ${escapeHtml(q.gabarito)}</div>` : ''}
          </div>`;
      }
      return `
        <div class="result-question-card">
          <div class="result-question-tag">${idx + 1}. ${tipo}${q.nota_nivel ? ` — nota: nível ${escapeHtml(String(q.nota_nivel))}` : ''}</div>
          <div class="result-question-text">${escapeHtml(q.pergunta || '')}</div>
          <div class="result-question-answer"><strong>Sua resposta:</strong> ${escapeHtml(q.resposta_usuario || '')}</div>
          ${q.critica ? `<div class="result-question-feedback"><strong>Crítica da IA:</strong> ${escapeHtml(q.critica)}</div>` : ''}
        </div>`;
    }).join('');

    card.innerHTML = `
      <div class="result-level-badge">
        <span class="level-num">NÍVEL ${nivel}</span>
        <span class="level-name">${escapeHtml(titulo)}</span>
      </div>

      <div class="result-score-big">${nivel}<span style="font-size:32px;color:var(--muted)">/5</span></div>
      <div class="result-score-label">nível de maturidade em IA</div>

      <div class="dim-bar-track" style="margin:16px 0 24px;">
        <div class="dim-bar-fill" style="width:0%;background:${barColor};" data-target="${pct}"></div>
      </div>

      <div class="result-section-title">Análise</div>
      <div class="result-desc">${escapeHtml(resumo)}</div>

      ${questoesHtml ? `
      <div class="result-section-title" style="margin-top:20px;">Detalhamento por questão</div>
      <div class="result-questions-list">${questoesHtml}</div>` : ''}

      <div class="result-section-title" style="margin-top:20px;">Próximos passos</div>
      <ul class="result-list">${passos.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>

      <div class="result-actions">
        <button class="btn-restart" onclick="restart()">Refazer avaliação</button>
        <button class="btn-share" onclick="copyResult(${nivel}, '${escapeAttr(titulo)}')">Copiar resultado</button>
      </div>
    `;

    overlay.style.display = 'flex';
    setTimeout(() => {
      card.querySelectorAll('.dim-bar-fill').forEach(b => { b.style.width = b.dataset.target + '%'; });
    }, 200);
  }

  function restart() {
    document.getElementById('resultOverlay').style.display = 'none';
    document.getElementById('messages').innerHTML = '';
    testAnswers = [];
    currentQ    = -1;
    document.getElementById('sessionTag').textContent = 'SESSÃO ATIVA';
    startTest();
  }

  function copyResult(nivel, titulo) {
    const text = `Fiz a avaliação de nível de IA da Huski — Nível ${nivel}/5: ${titulo}. huski.ai`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      btn.textContent = 'Copiado ✓';
      setTimeout(() => btn.textContent = 'Copiar resultado', 2000);
    });
  }

  function escapeAttr(str) {
    return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
