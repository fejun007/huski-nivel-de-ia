<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>huski — Nível de IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Tokens ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0F0F0F;
    --slate:  #1A1A1A;
    --panel:  #222222;
    --border: #2E2E2E;
    --white:  #FFFFFF;
    --fog:    #A8A8A8;
    --muted:  #6B6B6B;
    --pulse:  #00D4FF;
    --pulse-dim: #00D4FF18;
    --pulse-border: #00D4FF40;
    --score:  #00FF90;
    --alert:  #FF6B35;
  }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Layout ─────────────────────────────────────────────────── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    user-select: none;
  }
  .logo .bracket { color: var(--pulse); opacity: 0.7; }

  .header-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .session-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pulse);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--score);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Messages ───────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 88%;
    animation: msg-in 0.25s ease-out both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.aria { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--pulse);
    flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .msg.user .avatar {
    background: var(--pulse-dim);
    border-color: var(--pulse-border);
    color: var(--pulse);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
  }
  .msg.aria .bubble {
    background: var(--slate);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--white);
    border-left: 3px solid var(--pulse);
    padding-left: 14px;
  }
  .msg.user .bubble {
    background: var(--pulse-dim);
    border: 1px solid var(--pulse-border);
    border-top-right-radius: 4px;
    color: var(--white);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pulse);
    opacity: 0.4;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.4; transform: scale(1); }
    40%           { opacity: 1;   transform: scale(1.3); }
  }

  /* ── Input ──────────────────────────────────────────────────── */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--slate);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--pulse-border); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    caret-color: var(--pulse);
  }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--pulse);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    color: var(--ink);
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* ── Result Card ─────────────────────────────────────────────── */
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    animation: fade-in 0.4s ease both;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .result-card {
    background: var(--slate);
    border: 1px solid var(--border);
    border-top: 3px solid var(--pulse);
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    animation: card-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-level-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--pulse-dim);
    border: 1px solid var(--pulse-border);
    border-radius: 99px;
    padding: 4px 14px 4px 10px;
    margin-bottom: 20px;
  }
  .result-level-badge .level-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pulse);
    font-weight: 500;
  }
  .result-level-badge .level-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--pulse);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .result-score-big {
    font-family: 'DM Mono', monospace;
    font-size: 72px;
    font-weight: 500;
    color: var(--pulse);
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-score-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .result-desc {
    color: var(--fog);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 28px;
  }

  .result-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Dimensões */
  .dimensions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }
  .dim-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .dim-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dim-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    text-transform: capitalize;
  }
  .dim-score {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--pulse);
  }
  .dim-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--score);
    width: 0%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dim-bar-fill.low  { background: var(--alert); }
  .dim-bar-fill.mid  { background: var(--pulse); }
  .dim-bar-fill.high { background: var(--score); }

  /* Listas */
  .result-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }
  .result-list li {
    display: flex;
    gap: 10px;
    color: var(--fog);
    font-size: 14px;
    line-height: 1.5;
  }
  .result-list li::before {
    content: '·';
    color: var(--pulse);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-restart {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fog);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-restart:hover { border-color: var(--pulse-border); color: var(--white); }

  .btn-share {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--pulse);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-share:hover { opacity: 0.85; }

  /* ── Grid sutil ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; }

  /* ── Onboarding overlay ──────────────────────────────────────── */
  .onboarding-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 200;
  }
  .onboarding-card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .ob-brand {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
    align-self: flex-start;
  }
  .ob-brand span { color: var(--pulse); opacity: 0.7; }

  .aria-orb {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #00D4FF 0%, #7B2FBE 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    flex-shrink: 0;
    animation: orbIdle 3s ease-in-out infinite;
    transition: animation 0.2s;
  }
  @keyframes orbIdle {
    0%,100% { box-shadow: 0 0 0 0 #00D4FF30; }
    50%      { box-shadow: 0 0 0 14px #00D4FF00; }
  }
  .aria-orb.speaking {
    animation: orbSpeak 0.5s ease-in-out infinite;
  }
  @keyframes orbSpeak {
    0%,100% { box-shadow: 0 0 0 0 #00D4FF50; transform: scale(1); }
    50%      { box-shadow: 0 0 0 18px #00D4FF00; transform: scale(1.04); }
  }

  .speech-bubble {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    min-height: 90px;
  }
  .speech-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--pulse);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .speech-text {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--white);
  }
  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--pulse);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .ob-input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  .ob-input-group.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .ob-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .ob-input:focus { border-color: var(--pulse); }
  .ob-input::placeholder { color: var(--muted); }

  .btn-ob {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--pulse);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    opacity: 0;
    pointer-events: none;
  }
  .btn-ob.show {
    opacity: 1;
    pointer-events: all;
  }
  .btn-ob:hover { opacity: 0.88; transform: translateY(-1px); }

  .ob-dots {
    display: flex;
    gap: 6px;
  }
  .ob-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.35s, transform 0.35s;
  }
  .ob-dot.on { background: var(--pulse); transform: scale(1.3); }
</style>
</head>
<body>

<!-- Onboarding Overlay -->
<div class="onboarding-overlay" id="onboardingOverlay">
  <div class="onboarding-card">

    <div class="ob-brand">
      <span>[</span>H<span>]</span> huski
    </div>

    <div class="ob-dots">
      <div class="ob-dot on"  id="dot0"></div>
      <div class="ob-dot"     id="dot1"></div>
      <div class="ob-dot"     id="dot2"></div>
    </div>

    <div class="aria-orb" id="ariaOrb">A</div>

    <div class="speech-bubble">
      <div class="speech-label">ARIA</div>
      <div class="speech-text" id="speechText"></div>
    </div>

    <div class="ob-input-group" id="obInputGroup">
      <input class="ob-input" type="text" id="obInput"
             placeholder="Digite aqui..." maxlength="80"
             onkeydown="if(event.key==='Enter') obNext()" />
    </div>

    <button class="btn-ob" id="btnOb" onclick="obNext()">Continuar →</button>

  </div>
</div>

<!-- App -->
<div class="app">
  <header>
    <div class="logo">
      <span class="bracket">[</span>H<span class="bracket">]</span>
      <span style="font-size:16px;font-weight:700;letter-spacing:-0.01em;margin-left:6px">huski</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px;margin-left:12px">
      <span style="font-size:13px;font-weight:600;color:var(--white)">Nível de IA</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">conversa com ARIA</span>
    </div>
    <div class="header-meta">
      <div class="status-dot" id="statusDot"></div>
      <span class="session-tag" id="sessionTag">SESSÃO ATIVA</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msgInput"
        placeholder="Digite sua resposta..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>

<!-- Result Overlay (hidden) -->
<div class="result-overlay" id="resultOverlay" style="display:none">
  <div class="result-card" id="resultCard"></div>
</div>

<script>
  const API_BASE = 'https://huski-nivel-de-ia-production.up.railway.app';
  let history = [];
  let turnCount = 0;
  let userName = '';
  let obStep = 0;
  let ttsReady = false;

  // ── TTS via Gemini 2.5 Flash (backend) ───────────────────────
  let currentAudio = null;

  async function speak(text, onEnd) {
    // Cancela áudio anterior se houver
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }

    const orb = document.getElementById('ariaOrb');
    orb?.classList.add('speaking');

    try {
      const res = await fetch(`${API_BASE}/tts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) throw new Error('TTS falhou');

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const audio = new Audio(url);
      currentAudio = audio;

      audio.onended = () => {
        orb?.classList.remove('speaking');
        URL.revokeObjectURL(url);
        currentAudio = null;
        onEnd?.();
      };
      audio.onerror = () => {
        orb?.classList.remove('speaking');
        URL.revokeObjectURL(url);
        currentAudio = null;
        onEnd?.();
      };

      await audio.play();
    } catch (e) {
      // Fallback silencioso — typewriter continua normalmente
      orb?.classList.remove('speaking');
      onEnd?.();
    }
  }

  // ── Typewriter ────────────────────────────────────────────────
  function typeWriter(text, el, speed, onDone) {
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);
    const timer = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i++]), cursor);
      } else {
        clearInterval(timer);
        cursor.remove();
        onDone && onDone();
      }
    }, speed);
  }

  // ── Onboarding steps ─────────────────────────────────────────
  const OB_SCRIPTS = [
    {
      text: 'Olá! Seja muito bem-vindo à avaliação de maturidade em IA da Huski. Meu nome é ARIA e vou te acompanhar nessa jornada. Essa avaliação foi criada para mapear exatamente em qual estágio de uso de inteligência artificial você está hoje — sem julgamentos e sem respostas certas ou erradas. Antes de começarmos… como posso te chamar?',
      inputType: 'text',
      placeholder: 'Seu nome',
      btn: 'Continuar →',
      dot: 0,
    },
    {
      text: '', // preenchido dinamicamente com o nome
      inputType: 'textarea',
      placeholder: 'Me conta sua experiência com IA...',
      btn: 'Continuar →',
      dot: 1,
    },
    {
      text: '', // preenchido dinamicamente
      inputType: null,
      btn: 'Estou pronto! →',
      dot: 2,
    },
  ];

  function setDot(idx) {
    [0,1,2].forEach(i => {
      document.getElementById('dot'+i).classList.toggle('on', i === idx);
    });
  }

  function showObStep(stepIdx, extraText) {
    const step = OB_SCRIPTS[stepIdx];
    const el   = document.getElementById('speechText');
    const inp  = document.getElementById('obInputGroup');
    const btn  = document.getElementById('btnOb');
    const obIn = document.getElementById('obInput');

    setDot(step.dot);
    inp.classList.remove('show');
    btn.classList.remove('show');

    const scriptText = extraText || step.text;
    typeWriter(scriptText, el, 22, () => {
      // Mostra input/botão após terminar de digitar
      if (step.inputType) {
        if (step.inputType === 'textarea') {
          inp.innerHTML = `<textarea class="ob-input" id="obInput" rows="3"
            placeholder="${step.placeholder}"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();obNext()}"></textarea>`;
        } else {
          inp.innerHTML = `<input class="ob-input" type="text" id="obInput"
            placeholder="${step.placeholder}" maxlength="80"
            onkeydown="if(event.key==='Enter') obNext()" />`;
        }
        setTimeout(() => {
          inp.classList.add('show');
          btn.textContent = step.btn;
          btn.classList.add('show');
          document.getElementById('obInput')?.focus();
        }, 200);
      } else {
        inp.classList.remove('show');
        setTimeout(() => {
          btn.textContent = step.btn;
          btn.classList.add('show');
        }, 200);
      }
    });

    speak(scriptText);
  }

  async function obNext() {
    const obIn = document.getElementById('obInput');
    const val  = obIn ? obIn.value.trim() : '';

    if (obStep === 0) {
      if (!val) { obIn.focus(); return; }
      userName = val;
      obStep = 1;
      const txt = `Prazer te conhecer, ${userName}! Agora me conta uma coisa: o que você já fez com inteligência artificial? Pode ser qualquer coisa — desde usar o ChatGPT para escrever um e-mail até criar automações ou sistemas mais complexos. Não existe resposta errada aqui!`;
      showObStep(1, txt);

    } else if (obStep === 1) {
      if (!val) { obIn.focus(); return; }
      const iaExperience = val;
      obStep = 2;

      // Salva sessão no backend
      try {
        await fetch(`${API_BASE}/session/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome: userName, resposta_inicial: iaExperience }),
        });
      } catch (_) {}

      const txt = `Perfeito, ${userName}! Já tenho um ótimo contexto sobre você. A avaliação combina questões de múltipla escolha, perguntas abertas e alguns desafios práticos — deve levar entre 8 e 12 minutos. Tudo pronto para começar?`;
      showObStep(2, txt);

    } else if (obStep === 2) {
      speechSynthesis.cancel();
      document.getElementById('onboardingOverlay').style.display = 'none';
      startSession();
    }
  }

  // Inicia o onboarding assim que a página carrega
  window.addEventListener('load', () => {
    setTimeout(() => showObStep(0), 400);
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function startSession() {
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/nivel-ia/start`, { method: 'POST' });
      const data = await res.json();
      removeTyping();
      appendMessage('aria', data.message);
      history.push({ role: 'assistant', content: data.message });
      enableInput();
    } catch (e) {
      removeTyping();
      appendMessage('aria', `Olá, ${userName || 'bem-vindo'}! Tive um problema ao conectar. Tente recarregar a página.`);
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    disableInput();

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    turnCount++;

    showTyping();
    try {
      const res = await fetch(`${API_BASE}/nivel-ia/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history: history.slice(0, -1), message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.message) {
        appendMessage('aria', data.message);
        history.push({ role: 'assistant', content: data.message });
      }

      if (data.finished && data.result) {
        setTimeout(() => showResult(data.result), 800);
      } else {
        enableInput();
      }
    } catch (e) {
      removeTyping();
      appendMessage('aria', 'Ocorreu um erro. Tente novamente.');
      enableInput();
    }
  }

  function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const avatarLabel = role === 'aria' ? '[A]' : 'EU';
    msg.innerHTML = `
      <div class="avatar">${avatarLabel}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.className = 'msg aria';
    typing.id = 'typingMsg';
    typing.innerHTML = `
      <div class="avatar">[A]</div>
      <div class="bubble typing-indicator">
        <span></span><span></span><span></span>
      </div>
    `;
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function enableInput() {
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }

  function disableInput() {
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  }

  function showResult(result) {
    const overlay = document.getElementById('resultOverlay');
    const card = document.getElementById('resultCard');

    const dimNames = {
      consciencia: 'Consciência',
      uso: 'Uso',
      profundidade: 'Profundidade',
      integracao: 'Integração',
      mentalidade: 'Mentalidade',
    };

    const dimsHtml = Object.entries(result.dimensoes || {}).map(([key, val]) => {
      const cls = val < 40 ? 'low' : val < 70 ? 'mid' : 'high';
      return `
        <div class="dim-row">
          <div class="dim-header">
            <span class="dim-name">${dimNames[key] || key}</span>
            <span class="dim-score">${val}</span>
          </div>
          <div class="dim-bar-track">
            <div class="dim-bar-fill ${cls}" data-target="${val}"></div>
          </div>
        </div>
      `;
    }).join('');

    const destaquesHtml = (result.destaques || []).map(d => `<li>${escapeHtml(d)}</li>`).join('');
    const proximosHtml  = (result.proximos_passos || []).map(d => `<li>${escapeHtml(d)}</li>`).join('');

    card.innerHTML = `
      <div class="result-level-badge">
        <span class="level-num">NÍVEL ${result.nivel}</span>
        <span class="level-name">${result.nivel_nome}</span>
      </div>
      <div class="result-score-big">${result.score_total}</div>
      <div class="result-score-label">/ 100 · score geral</div>
      <div class="result-desc">${escapeHtml(result.descricao)}</div>

      <div class="result-section-title">Dimensões</div>
      <div class="dimensions">${dimsHtml}</div>

      ${destaquesHtml ? `
        <div class="result-section-title">Pontos fortes</div>
        <ul class="result-list">${destaquesHtml}</ul>
      ` : ''}

      ${proximosHtml ? `
        <div class="result-section-title">Próximos passos</div>
        <ul class="result-list">${proximosHtml}</ul>
      ` : ''}

      <div class="result-actions">
        <button class="btn-restart" onclick="restart()">Refazer avaliação</button>
        <button class="btn-share" onclick="copyResult(${result.score_total}, '${result.nivel_nome}')">Copiar resultado</button>
      </div>
    `;

    overlay.style.display = 'flex';

    // Anima barras com delay
    setTimeout(() => {
      card.querySelectorAll('.dim-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.target + '%';
      });
    }, 200);
  }

  function restart() {
    document.getElementById('resultOverlay').style.display = 'none';
    document.getElementById('messages').innerHTML = '';
    history = [];
    turnCount = 0;
    disableInput();
    startSession();
  }

  function copyResult(score, nivel) {
    const text = `Fiz a avaliação de nível de IA da Huski e tirei ${score}/100 — Nível: ${nivel}. huski.ai`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      btn.textContent = 'Copiado ✓';
      setTimeout(() => btn.textContent = 'Copiar resultado', 2000);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
